<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background circle -->
  <rect width="512" height="512" rx="115" fill="#FFF8F4"/>

  <!-- Gradient definitions -->
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FAD9E8"/>
      <stop offset="100%" stop-color="#EAE6FF"/>
    </radialGradient>
  </defs>
  <rect width="512" height="512" rx="115" fill="url(#bgGrad)"/>

  <!-- Flower petals -->
  <ellipse cx="256" cy="130" rx="38" ry="62" fill="#F4C0D1" opacity=".95"/>
  <ellipse cx="256" cy="130" rx="38" ry="62" fill="#F4C0D1" opacity=".95" transform="rotate(45 256 256)"/>
  <ellipse cx="256" cy="130" rx="38" ry="62" fill="#F4C0D1" opacity=".95" transform="rotate(90 256 256)"/>
  <ellipse cx="256" cy="130" rx="38" ry="62" fill="#F4C0D1" opacity=".95" transform="rotate(135 256 256)"/>
  <ellipse cx="256" cy="130" rx="38" ry="62" fill="#ED93B1" opacity=".75" transform="rotate(22.5 256 256)"/>
  <ellipse cx="256" cy="130" rx="38" ry="62" fill="#ED93B1" opacity=".75" transform="rotate(67.5 256 256)"/>
  <ellipse cx="256" cy="130" rx="38" ry="62" fill="#ED93B1" opacity=".75" transform="rotate(112.5 256 256)"/>
  <ellipse cx="256" cy="130" rx="38" ry="62" fill="#ED93B1" opacity=".75" transform="rotate(157.5 256 256)"/>

  <!-- Face circle -->
  <circle cx="256" cy="256" r="110" fill="#FDE8D4" stroke="#F8C8A0" stroke-width="5"/>

  <!-- Cheeks -->
  <ellipse cx="210" cy="278" rx="28" ry="20" fill="#F9B8C8" opacity=".65"/>
  <ellipse cx="302" cy="278" rx="28" ry="20" fill="#F9B8C8" opacity=".65"/>

  <!-- Eyes -->
  <ellipse cx="224" cy="242" rx="17" ry="21" fill="#5A3B4A"/>
  <ellipse cx="288" cy="242" rx="17" ry="21" fill="#5A3B4A"/>
  <circle cx="230" cy="235" r="6" fill="white"/>
  <circle cx="294" cy="235" r="6" fill="white"/>

  <!-- Smile -->
  <path d="M210 290 Q256 328 302 290" stroke="#C4527A" stroke-width="8" fill="none" stroke-linecap="round"/>

  <!-- Bow -->
  <path d="M218 168 Q244 148 256 168 Q244 188 218 168z" fill="#7B6DC9"/>
  <path d="M256 168 Q268 148 294 168 Q268 188 256 168z" fill="#7B6DC9"/>
  <circle cx="256" cy="168" r="13" fill="#534AB7"/>

  <!-- App name text -->
  <text x="256" y="430" text-anchor="middle" font-family="Georgia, serif" font-size="72" font-weight="bold" fill="#C4527A" letter-spacing="-2">Bloom</text>
</svg>
